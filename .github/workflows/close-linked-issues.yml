name: Close Linked Issues

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - dev

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-linked-issues:
    name: Close linked issues after merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close issues referenced by closing keywords
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumbers = new Set();
            const closingLinePattern =
              /^\s*(?:[-*]\s*)?(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(.+)$/i;
            const issueRefPattern =
              /(?:https:\/\/github\.com\/([^/\s]+)\/([^/\s]+)\/issues\/)?#(\d+)\b/gi;

            let inFence = false;
            for (const line of body.split(/\r?\n/)) {
              if (line.trimStart().startsWith('```')) {
                inFence = !inFence;
                continue;
              }

              if (inFence) {
                continue;
              }

              const closingLine = line.match(closingLinePattern);
              if (!closingLine) {
                continue;
              }

              for (const issueRef of closingLine[1].matchAll(issueRefPattern)) {
                const refOwner = issueRef[1];
                const refRepo = issueRef[2];
                if ((refOwner && refOwner !== owner) || (refRepo && refRepo !== repo)) {
                  core.info(`Skipping external issue reference: ${issueRef[0]}.`);
                  continue;
                }

                issueNumbers.add(Number(issueRef[3]));
              }
            }

            if (issueNumbers.size === 0) {
              core.info(`No linked issues found in PR #${pr.number}.`);
              return;
            }

            for (const issue_number of issueNumbers) {
              let issue;
              try {
                const response = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number,
                });
                issue = response.data;
              } catch (error) {
                if (error.status === 404) {
                  core.warning(`Issue #${issue_number} was not found; skipping.`);
                  continue;
                }

                throw error;
              }

              if (issue.pull_request) {
                core.info(`#${issue_number} is a pull request; skipping.`);
                continue;
              }

              if (issue.state === 'closed') {
                core.info(`Issue #${issue_number} is already closed.`);
                continue;
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed',
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Fixed by #${pr.number} and merged into \`${pr.base.ref}\`.`,
              });

              core.info(`Closed issue #${issue_number}.`);
            }
