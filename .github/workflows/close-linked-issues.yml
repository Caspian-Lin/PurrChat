name: Close Linked Issues

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - dev

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-linked-issues:
    name: Close linked issues after merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close issues referenced by closing keywords
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumbers = new Set();
            const closingKeywordPattern =
              /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(?:https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/)?#?(\d+)\b/gi;

            for (const match of body.matchAll(closingKeywordPattern)) {
              issueNumbers.add(Number(match[1]));
            }

            if (issueNumbers.size === 0) {
              core.info(`No linked issues found in PR #${pr.number}.`);
              return;
            }

            for (const issue_number of issueNumbers) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Fixed by #${pr.number} and merged into \`${pr.base.ref}\`.`,
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed',
              });

              core.info(`Closed issue #${issue_number}.`);
            }
