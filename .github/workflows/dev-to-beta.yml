name: Dev to Beta Pipeline

on:
  push:
    branches:
      - dev

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  # ==================== TEST JOBS ====================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录，用于合并

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./apps/frontend
        run: pnpm install

      - name: Run lint
        working-directory: ./apps/frontend
        run: pnpm lint

      - name: Run tests with coverage
        working-directory: ./apps/frontend
        run: pnpm test:coverage --run

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: testdb
      DB_USER: testuser
      DB_PASSWORD: testpass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: ./apps/backend
        run: go mod download

      - name: Check Go formatting
        working-directory: ./apps/backend
        run: |
          if ! gofmt -l . | grep -q .; then
            echo "❌ Go 文件格式不正确"
            gofmt -l .
            exit 1
          fi

      - name: Run golangci-lint
        working-directory: ./apps/backend
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m

      - name: Run tests with coverage
        working-directory: ./apps/backend
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

  test-storage:
    name: Test Storage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: ./apps/storage
        run: go mod download

      - name: Run lint
        working-directory: ./apps/storage
        run: go vet ./...

      - name: Run tests with coverage
        working-directory: ./apps/storage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

  # ==================== MERGE JOB ====================
  merge-to-beta:
    name: Merge dev to beta
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-storage]
    if: success()  # 只有所有测试通过才执行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Merge dev to beta
        run: |
          # 切换到beta分支
          git checkout beta || git checkout -b beta origin/beta
          
          # 拉取最新代码
          git pull origin beta
          
          # 合并dev分支
          git merge dev -m "Merge dev to beta [skip ci]"
          
          # 推送到远程beta分支
          git push origin beta

      - name: Notify success
        if: success()
        run: |
          echo "✅ Successfully merged dev to beta!"
          echo "🚀 Beta branch is ready for manual deployment"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Failed to merge dev to beta!"
          exit 1
