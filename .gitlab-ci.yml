stages:
  - lint
  - test
  - build
  - deploy

variables:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  DOCKER_IMAGE_BACKEND: purrchat-backend
  DOCKER_IMAGE_FRONTEND: purrchat-frontend
  DOCKER_TLS_CERTDIR: "/certs"

# ==================== LINT 阶段 ====================

# 前端代码检查
lint:frontend:
  stage: lint
  image: node:20
  before_script:
    - cd apps/frontend
    - npm install -g pnpm@9
    - pnpm install
  script:
    - pnpm lint
  only:
    - main
    - develop
    - merge_requests

# 后端代码检查
lint:backend:
  stage: lint
  image: golang:1.24
  before_script:
    - cd apps/backend
    - apt-get update && apt-get install -y git && rm -rf /var/lib/apt/lists/*
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  script:
    - golangci-lint run --timeout=5m
  only:
    - main
    - develop
    - merge_requests

# ==================== TEST 阶段 ====================

# 前端测试
test:frontend:
  stage: test
  image: node:20
  before_script:
    - cd apps/frontend
    - npm install -g pnpm@9
    - pnpm install
  script:
    - pnpm test:coverage
  coverage: '/Lines\s+:\s+\d+\.?\d*%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: apps/frontend/coverage/cobertura-coverage.xml
    paths:
      - apps/frontend/coverage/
    expire_in: 30 days
  only:
    - main
    - develop
    - merge_requests

# 后端测试
test:backend:
  stage: test
  image: golang:1.24
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: testuser
    POSTGRES_PASSWORD: testpass
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: testdb
    DB_USER: testuser
    DB_PASSWORD: testpass
  before_script:
    - cd apps/backend
    - apt-get update && apt-get install -y git postgresql-client && rm -rf /var/lib/apt/lists/*
    - go mod download
  script:
    - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -html=coverage.out -o coverage.html
  coverage: '/coverage: \d+\.\d+% of statements/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: apps/backend/coverage.out
    paths:
      - apps/backend/coverage.html
      - apps/backend/coverage.out
    expire_in: 30 days
  only:
    - main
    - develop
    - merge_requests

# ==================== BUILD 阶段 ====================

# 构建前端 Docker 镜像
build:frontend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker buildx create --use
    - docker buildx build --push
      --platform linux/amd64
      --tag $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
      --tag $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG
      --tag $CI_REGISTRY_IMAGE/frontend:latest
      --cache-from type=registry,ref=$CI_REGISTRY_IMAGE/frontend:buildcache
      --cache-to type=registry,ref=$CI_REGISTRY_IMAGE/frontend:buildcache,mode=max
      -f apps/frontend/Dockerfile
      apps/frontend
  only:
    - main
    - develop

# 构建后端 Docker 镜像
build:backend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker buildx create --use
    - docker buildx build --push
      --platform linux/amd64
      --tag $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
      --tag $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG
      --tag $CI_REGISTRY_IMAGE/backend:latest
      --cache-from type=registry,ref=$CI_REGISTRY_IMAGE/backend:buildcache
      --cache-to type=registry,ref=$CI_REGISTRY_IMAGE/backend:buildcache,mode=max
      -f apps/backend/Dockerfile
      apps/backend
  only:
    - main
    - develop

# ==================== DEPLOY 阶段 ====================

# 部署到开发环境
deploy:dev:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - echo "$DEV_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEV_SERVER_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh $DEV_SERVER_USER@$DEV_SERVER_HOST << 'EOF'
        cd /opt/purrchat
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker-compose pull backend frontend
        docker-compose up -d backend frontend
        docker image prune -f
      EOF
    - |
      ssh $DEV_SERVER_USER@$DEV_SERVER_HOST << 'EOF'
        cd /opt/purrchat
        docker-compose exec -T postgres psql -U postgres -d purrchat -f /docker-entrypoint-initdb.d/001_init_schema.sql
        docker-compose exec -T postgres psql -U postgres -d purrchat -f /docker-entrypoint-initdb.d/002_update_schema.sql
      EOF
    - sleep 10
    - curl -f https://dev.purrchat.com/health || exit 1
    - curl -f https://dev.purrchat.com/ || exit 1
  environment:
    name: development
    url: https://dev.purrchat.com
  only:
    - develop
  when: manual

# 部署到生产环境
deploy:prod:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $PROD_SERVER_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
        cd /opt/purrchat
        docker-compose exec -T postgres pg_dump -U postgres purrchat > backup_$(date +%Y%m%d_%H%M%S).sql
      EOF
    - |
      ssh $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
        cd /opt/purrchat
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker-compose pull backend frontend
        docker-compose up -d backend frontend
        docker image prune -f
      EOF
    - |
      ssh $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
        cd /opt/purrchat
        docker-compose exec -T postgres psql -U postgres -d purrchat -f /docker-entrypoint-initdb.d/001_init_schema.sql
        docker-compose exec -T postgres psql -U postgres -d purrchat -f /docker-entrypoint-initdb.d/002_update_schema.sql
      EOF
    - sleep 10
    - curl -f https://api.purrchat.com/health || exit 1
    - curl -f https://purrchat.com/ || exit 1
  environment:
    name: production
    url: https://purrchat.com
  only:
    - main
  when: manual
